on:
  push:
    branches: ["playnite11"]
  pull_request:
    branches: ["playnite11"]

name: Release Build (Playnite 11)

env:
  PLAYNITE_VERSION: "11.0.2.0"

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore GsPlugin.sln

      - name: Verify Formatting
        run: dotnet format GsPlugin.sln --verify-no-changes

      - name: Build
        run: dotnet build GsPlugin.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test GsPlugin.Tests/GsPlugin.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Setup Playnite Toolbox
        run: |
          Invoke-WebRequest -Uri "https://github.com/JosefNemec/Playnite/releases/download/${{ env.PLAYNITE_VERSION }}/Playnite${{ env.PLAYNITE_VERSION }}.zip" -OutFile "$Env:GITHUB_WORKSPACE\Playnite.zip"
          Expand-Archive "$Env:GITHUB_WORKSPACE\Playnite.zip" -DestinationPath "$Env:GITHUB_WORKSPACE\Playnite"

      - name: Pack with Playnite Toolbox
        id: pack
        run: |
          mkdir "PackingOutput"
          & "$Env:GITHUB_WORKSPACE\Playnite\Toolbox.exe" pack "$Env:GITHUB_WORKSPACE\bin\Release\net10.0-windows" "$Env:GITHUB_WORKSPACE\PackingOutput"
          Get-ChildItem "$Env:GITHUB_WORKSPACE\PackingOutput" -Filter *.pext2 | Rename-Item -NewName ("GsPlugin_" + "${{ github.ref_name }}".Replace("/", "_") + ".pext2")
          Move-Item -Path "$Env:GITHUB_WORKSPACE\PackingOutput\*.pext2" -Destination $Env:GITHUB_WORKSPACE

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/playnite11'
        id: release
        uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Create Sentry Release
        if: ${{ steps.release.outputs.release_created }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: game-scrobbler
          SENTRY_PROJECT: gs-playnite
        run: |
          npm install -g @sentry/cli@2.42.2
          $version = "${{ steps.release.outputs.tag_name }}".TrimStart('v')
          sentry-cli releases new "GsPlugin@$version"
          sentry-cli releases set-commits "GsPlugin@$version" --auto
          sentry-cli upload-dif --type=portablepdb "$Env:GITHUB_WORKSPACE\bin\Release\net10.0-windows" --log-level=info
          sentry-cli releases finalize "GsPlugin@$version"

      - name: Rename Packed File to Release Tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          Get-ChildItem "$Env:GITHUB_WORKSPACE" -Filter *.pext2 | Rename-Item -NewName ("${{ steps.release.outputs.tag_name }}" + ".pext2")

      - name: Upload Release Artifact
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} .\${{ steps.release.outputs.tag_name }}.pext2

      - name: Update Installer Manifest
        if: ${{ steps.release.outputs.release_created }}
        run: |
          $version = "${{ steps.release.outputs.tag_name }}".Replace("GsPlugin-v", "")
          powershell -ExecutionPolicy Bypass -File "$Env:GITHUB_WORKSPACE\scripts\update-installer-manifest.ps1" -Version $version -TagName "${{ steps.release.outputs.tag_name }}"

      - name: Commit and Push Manifest Changes
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add installer_manifest.yaml
          git diff --cached --quiet || git commit -m "chore: update installer_manifest.yaml for ${{ steps.release.outputs.tag_name }}"
          git push
